# Logrotate 配置示例
# 用于 sec-auditd 日志轮转管理

# Auditd 审计日志轮转
/var/log/audit/audit.log {
    # 轮转频率：每天
    daily

    # 保留天数：30 天
    rotate 30

    # 压缩旧日志
    compress

    # 延迟压缩（保留最新的一个未压缩）
    delaycompress

    # 如果日志不存在不报错
    missingok

    # 不轮转空文件
    notifempty

    # 轮转后创建新文件（权限 0600，属主 root:root）
    create 0600 root root

    # 大小限制：超过 100MB 立即轮转
    size 100M

    # 使用日期作为后缀
    dateext
    dateformat -%Y%m%d-%s

    # 轮转前执行的命令
    prerotate
        # 可以在这里添加备份操作
        # /usr/local/bin/backup-audit-log.sh
    endscript

    # 轮转后执行的命令
    postrotate
        # 通知 auditd 重新打开日志文件
        /sbin/service auditd reload > /dev/null 2>&1 || true
    endscript

    # 共享脚本（多个日志共享 postrotate 脚本）
    sharedscripts
}

# SEC-AUDITD 告警日志轮转
/var/log/sec-auditd/alert.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    size 50M
    dateext
    dateformat -%Y%m%d-%s

    # 告警日志不需要特殊的 postrotate 操作
    # Python 程序会自动检测文件变化
}

# 可选：所有 sec-auditd 日志的全局配置
/var/log/sec-auditd/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    size 50M
    dateext
    dateformat -%Y%m%d-%s
}
